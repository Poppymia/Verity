<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verity</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Verity</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v6m0 6v6m5.2-13.2-4.2 4.2m0 6 4.2 4.2M23 12h-6m-6 0H1m13.2 5.2-4.2-4.2m0-6-4.2-4.2"/>
        </svg>
      </button>
    </div>

    <div class="domain-section">
      <h3>Domain Trust Score</h3>
      <div class="trust-score-display">
        <div class="trust-score-circle" id="trustScoreCircle">
          <span class="trust-score-value" id="trustScoreValue">--</span>
          <span class="trust-score-max">/100</span>
        </div>
        <div class="trust-score-info">
          <p id="domainName" class="domain-name">--</p>
          <p class="trust-score-desc" id="trustScoreDesc">Analyzing...</p>
        </div>
      </div>
      
      <div class="domain-details">
        <p id="categoryDisplay" class="category-text">Category: --</p>
        <p id="reasonDisplay" class="reason-text">--</p>
      </div>
    </div>

    <div class="actions-section">
      <button class="action-btn primary" id="rescanBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Rescan Domain
      </button>
      <button class="action-btn secondary" id="learnMoreBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        How It Works
      </button>
    </div>

    <div class="quick-info">
      <p class="info-text">
        <strong>Trust scores</strong> are based on domain reputation, 
        historical accuracy, and verification sources.
      </p>
      <div class="score-legend">
        <div class="legend-item">
          <span class="legend-dot high"></span>
          <span>80-100: Highly Trusted</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot medium"></span>
          <span>50-79: Use Caution</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot low"></span>
          <span>0-49: High Risk</span>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
